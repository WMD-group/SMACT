[tool.coverage.run]
omit = [
    "smact/benchmarking/*",
    "smact/utils/band_gap_simple.py",
    "smact/utils/crystal_space/plot_embedding.py",
]

[tool.coverage.report]
fail_under = 85
exclude_also = [
    'def __repr__',
    'if self.debug:',
    'if settings.DEBUG',
    'raise AssertionError',
    'raise NotImplementedError',
    'if 0:',
    'if __name__ == .__main__.:',
    'if TYPE_CHECKING:',
    'class .*\bProtocol\):',
    '@(abc\.)?abstractmethod',
    ]

[dependency-groups]
dev = [
    "coverage>=7.10.6",
    "jupyter>=1.1.1",
    "jupyter-client>=8.6.3",
    "notebook>=7.3.3",
    "blacken-docs>=1.19.1",
    "codespell>=2.4.1",
    "ipykernel>=6.29.5",
    "myst-nb==1.3.0",
    "nbstripout>=0.8.1",
    "pre-commit>=4.2.0",
